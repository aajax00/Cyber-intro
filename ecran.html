<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Monitoring Global</title>
    <script src="https://unpkg.com/mqtt/dist/mqtt.min.js"></script>
    <style>
        body { background-color: #020617; color: white; font-family: monospace; padding: 40px; overflow: hidden; }
        h1 { text-align: center; font-size: 3em; color: #22d3ee; }
        
        .dashboard { display: grid; grid-template-columns: 1fr 1fr; gap: 40px; margin-top: 50px; }
        .panel { background: #0f172a; padding: 20px; border-radius: 10px; border: 2px solid #334155; min-height: 400px; }
        
        .panel-red { border-color: #ef4444; box-shadow: 0 0 20px rgba(239, 68, 68, 0.2); }
        .panel-blue { border-color: #3b82f6; box-shadow: 0 0 20px rgba(59, 130, 246, 0.2); }
        
        h2 { text-align: center; }
        .red-text { color: #ef4444; }
        .blue-text { color: #3b82f6; }

        .log-list { list-style: none; padding: 0; font-size: 1.2em; }
        .log-list li { padding: 10px; border-bottom: 1px solid #334155; animation: fadeIn 0.5s; }

        /* Animation d'alerte sur l'écran */
        @keyframes fadeIn { from { opacity: 0; transform: translateX(-20px); } to { opacity: 1; transform: translateX(0); } }
        @keyframes flashRed { 0% { background-color: #020617; } 50% { background-color: #450a0a; } 100% { background-color: #020617; } }
        @keyframes flashBlue { 0% { background-color: #020617; } 50% { background-color: #172554; } 100% { background-color: #020617; } }

        .flash-red { animation: flashRed 0.5s; }
        .flash-blue { animation: flashBlue 0.5s; }
    </style>
</head>
<body>

    <h1>🖥️ SOC - Centre Opérationnel de Sécurité</h1>
    <p style="text-align: center; color: #94a3b8; font-size: 1.5em;">En attente des actions des équipes...</p>

    <div class="dashboard">
        <div class="panel panel-red">
            <h2 class="red-text">🔥 Activité RED TEAM (Attaque)</h2>
            <ul id="logs-attaque" class="log-list"></ul>
        </div>
        
        <div class="panel panel-blue">
            <h2 class="blue-text">🛡️ Activité BLUE TEAM (Défense)</h2>
            <ul id="logs-defense" class="log-list"></ul>
        </div>
    </div>

    <script>
        const client = mqtt.connect('wss://broker.emqx.io:8084/mqtt');
        const topic = "campus-cyber-kyndryl-2026-demo";

        client.on('connect', function () {
            console.log("Connecté en tant qu'écran principal");
            client.subscribe(topic);
        });

        // Dès qu'un téléphone appuie sur un bouton, ce code s'exécute
        client.on('message', function (topic, message) {
            const data = JSON.parse(message.toString());
            const time = new Date().toLocaleTimeString();
            
            if (data.team === 'attaque') {
                document.body.classList.remove('flash-blue', 'flash-red');
                void document.body.offsetWidth; // Reset animation
                document.body.classList.add('flash-red');

                const logList = document.getElementById('logs-attaque');
                const li = document.createElement('li');
                li.innerHTML = `[${time}] ⚠️ <strong>${data.action}</strong> détectée !`;
                logList.prepend(li); // Ajoute en haut de la liste

            } else if (data.team === 'defense') {
                document.body.classList.remove('flash-blue', 'flash-red');
                void document.body.offsetWidth; // Reset animation
                document.body.classList.add('flash-blue');

                const logList = document.getElementById('logs-defense');
                const li = document.createElement('li');
                li.innerHTML = `[${time}] 🟢 <strong>${data.action}</strong> déployée.`;
                logList.prepend(li);
            }
        });
    </script>
</body>
</html>
