<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Master Control</title>
    <script src="https://unpkg.com/mqtt/dist/mqtt.min.js"></script>
    <style>
        body { font-family: Arial, sans-serif; background: #e2e8f0; padding: 10px; margin: 0; }
        .dashboard { background: white; padding: 15px; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); width: 100%; box-sizing: border-box; }
        h1 { color: #0f172a; margin-top: 0; font-size: 22px; text-align: center;}
        h3 { color: #334155; font-size: 18px; margin: 10px 0;}
        button { border: none; padding: 20px 10px; margin: 10px 0; cursor: pointer; border-radius: 8px; font-weight: bold; width: 100%; font-size:18px; color: white;}
        .btn-blue { background: #3b82f6; } .btn-blue:active { background: #2563eb; }
        .btn-red { background: #ef4444; } .btn-red:active { background: #dc2626; }
        .btn-green { background: #10b981; } .btn-green:active { background: #059669; }
        .btn-dark { background: #334155; font-size: 14px; padding: 15px;} .btn-dark:active { background: #1e293b; }
        .stats { display: flex; justify-content: space-around; background: #f8fafc; padding: 10px; border-radius: 5px; margin-bottom: 15px; font-size: 18px; font-weight: bold; border: 1px solid #cbd5e1;}
        .logs { height: 100px; overflow-y: scroll; background: #1e293b; color: #4ade80; padding: 10px; font-family: monospace; font-size: 12px; margin-top: 20px; border-radius: 5px;}
        #explanation-box { background: #fffbeb; border-left: 5px solid #f59e0b; padding: 15px; margin-top: 15px; display: none; font-size: 16px; color: #92400e; line-height: 1.4;}
        #explanation-title { font-weight: bold; margin-bottom: 5px; text-transform: uppercase;}
    </style>
</head>
<body>

    <div class="dashboard">
        <h1>Terminal Formateur</h1>
        
        <div class="stats">
            <div style="color: #ef4444;">🔴 <span id="count-red">0</span></div>
            <div style="color: #3b82f6;">🔵 <span id="count-blue">0</span></div>
        </div>

        <h3 id="current-q-info">Chargement de la session...</h3>
        
        <button class="btn-blue" onclick="startGame()">▶️ 1. Envoyer la Question</button>
        <button class="btn-red" onclick="closeVotes()">🛑 2. Résultat (Fin votes)</button>
        <button class="btn-green" onclick="triggerAnimation()">💥 3. Lancer l'Animation</button>
        
        <div id="explanation-box">
            <div id="explanation-title">Explication :</div>
            <div id="explanation-text"></div>
        </div>

        <div class="logs" id="logs"></div>

        <button class="btn-dark" onclick="resetAll()">🔄 Réinitialiser toute la partie (Nouvelle session)</button>
    </div>

    <script>
        const client = mqtt.connect('wss://broker.emqx.io:8084/mqtt');
        const topic = "campus-cyber-kahoot-kydryl-2026";
        
        const questions = [
            { team: 'red', text: "L'IP publique est trouvée. Que faites-vous en premier ?", options: ["Attaque DDoS", "Scan Nmap (ports ouverts)", "Malware par la poste", "Attaquer le pare-feu"], correct: 1, animType: 'nmap', exp: "Un scan de ports (Nmap) est la base de la reconnaissance. Cela permet de voir quelles portes d'entrée (ports) sont ouvertes sur le serveur sans bloquer le système." },
            { team: 'blue', text: "Alerte ! Le pare-feu détecte un scan massif de ports.", options: ["Éteindre les serveurs", "Bloquer automatiquement l'IP", "Ignorer (c'est Google)", "Lancer un scan retour"], correct: 1, animType: 'soc-block', exp: "La meilleure défense immédiate est le blocage automatique de l'IP source via le Firewall, souvent géré par des outils de détection comme Fail2Ban ou un IPS." },
            { team: 'red', text: "Le port Web est ouvert. Comment trouver les pages cachées ?", options: ["Bruteforce du mot de passe", "Outil Gobuster (énumération)", "Attaque Phishing", "Abandonner"], correct: 1, animType: 'gobuster', exp: "Gobuster teste des milliers de noms de répertoires à la seconde (/admin, /uploads, /backup) pour trouver des zones non protégées sur le site." },
            { team: 'blue', text: "Le serveur génère des centaines d'erreurs 404 par minute !", options: ["Bloquer avec Fail2Ban", "Mettre un antivirus", "C'est normal", "Changer le site"], correct: 0, animType: 'soc-404', exp: "Des centaines d'erreurs 404 signifient qu'un outil comme Gobuster cherche des pages. Un outil comme Fail2Ban détecte ce comportement anormal et bannit l'attaquant." },
            { team: 'red', text: "Page de connexion (/admin) trouvée. Comment y entrer ?", options: ["Injection SQL (SQLi)", "Envoyer un Ransomware", "Appeler l'entreprise", "Scanner le port 22"], correct: 0, animType: 'sqli', exp: "L'injection SQL consiste à taper du code de base de données (ex: ' OR 1=1 --) directement dans le formulaire pour tromper le système et se connecter sans mot de passe." },
            { team: 'blue', text: "Une tentative d'Injection SQL est détectée dans les logs.", options: ["Supprimer la BDD", "Changer le Wi-Fi", "Déployer un WAF", "Rien faire"], correct: 2, animType: 'soc-sqli', exp: "Le WAF (Web Application Firewall) analyse le trafic web et bloque les requêtes malveillantes comme les injections SQL avant même qu'elles ne touchent la base de données." },
            { team: 'red', text: "Connecté, mais droits limités. Que chercher pour devenir Root ?", options: ["Téléphone du PDG", "Éteindre le site", "Fichiers de config (mots de passe)", "Modifier le logo"], correct: 2, animType: 'reverse-shell', exp: "L'élévation de privilèges consiste à fouiller le système à la recherche de fichiers mal sécurisés (comme config.php) qui contiennent les identifiants de l'administrateur suprême (Root)." },
            { team: 'blue', text: "Un compte basique tente d'accéder à des dossiers sensibles.", options: ["Renvoyer l'employé", "Restreindre les droits (Moindre Privilège)", "Attendre", "Formater le serveur"], correct: 1, animType: 'soc-priv', exp: "Le principe du 'moindre privilège' garantit qu'un utilisateur ou un programme n'a accès qu'aux informations strictement nécessaires à son travail. S'il tente d'aller ailleurs, le système le bloque." },
            { team: 'red', text: "Accès au serveur interne ! Comment voler les plans discrètement ?", options: ["Par Gmail", "Imprimer au bureau", "Clé USB virtuelle", "Exfiltration via DNS"], correct: 3, animType: 'exfil', exp: "Les protocoles classiques (HTTP, FTP) sont surveillés. Les attaquants cachent souvent les données volées dans de fausses requêtes DNS (le système qui traduit les noms de domaine) pour passer sous le radar." },
            { team: 'blue', text: "Fuite de données en cours vers l'extérieur. Ultime recours !", options: ["Payer", "Couper connexions et Réponse à Incident", "Supprimer les données", "Fermer les yeux"], correct: 1, animType: 'soc-incident', exp: "En cas d'exfiltration avérée, il faut isoler immédiatement le réseau (couper l'accès internet) pour stopper la fuite, et activer l'équipe de réponse à incident (DFIR) pour enquêter." },
            { team: 'both', text: "BONUS (Toutes équipes) : Ce mail est-il du Phishing ?", options: ["Oui, Phishing", "Non, c'est légitime", "C'est un spam inoffensif", "C'est une newsletter"], correct: 0, animType: 'phishing', exp: "C'est du Typosquattage ! Regardez l'adresse : safeRNech.com (avec un 'r' et un 'n') au lieu de safeMech. L'œil humain lit rapidement un 'm'." }
        ];

        // --- RESTAURATION DES DONNÉES SI LE FORMATEUR RAFRAICHIT ---
        let currentQIndex = parseInt(localStorage.getItem('gm_qIndex'));
        if (isNaN(currentQIndex)) currentQIndex = -1;
        
        let currentVotes = JSON.parse(localStorage.getItem('gm_votes')) || {};
        
        let players = { red: new Set(), blue: new Set() };
        let savedPlayers = JSON.parse(localStorage.getItem('gm_players'));
        if(savedPlayers) {
            players.red = new Set(savedPlayers.red);
            players.blue = new Set(savedPlayers.blue);
        }

        function saveGMState() {
            localStorage.setItem('gm_qIndex', currentQIndex);
            localStorage.setItem('gm_votes', JSON.stringify(currentVotes));
            localStorage.setItem('gm_players', JSON.stringify({ red: Array.from(players.red), blue: Array.from(players.blue) }));
            updateUI();
        }

        function updateUI() {
            document.getElementById('count-red').innerText = players.red.size;
            document.getElementById('count-blue').innerText = players.blue.size;
            if(currentQIndex >= 0 && currentQIndex < questions.length) {
                let t = questions[currentQIndex].team === 'both' ? "BONUS" : questions[currentQIndex].team.toUpperCase();
                document.getElementById('current-q-info').innerText = `Tour ${currentQIndex + 1}/11 : ${t} TEAM`;
            } else {
                document.getElementById('current-q-info').innerText = currentQIndex >= questions.length ? "Partie Terminée" : "Prêt à démarrer l'atelier...";
            }
        }
        updateUI(); // Appel initial

        // --- MQTT ---
        client.subscribe(topic);

        client.on('message', (t, msg) => {
            const data = JSON.parse(msg.toString());
            if (data.type === 'JOIN') {
                players[data.team].add(data.id);
                saveGMState();
                updateScreenCounts();
            }
            if (data.type === 'VOTE') {
                currentVotes[data.id] = data.choice;
                saveGMState();
                updateScreenCounts();
            }
        });

        function updateScreenCounts() {
            if (currentQIndex >= 0 && currentQIndex < questions.length) {
                const team = questions[currentQIndex].team;
                const total = team === 'both' ? (players['red'].size + players['blue'].size) : players[team].size;
                client.publish(topic, JSON.stringify({
                    type: 'VOTER_UPDATE',
                    votes: Object.keys(currentVotes).length,
                    totalTeam: total
                }), { retain: true }); // Retain pour que l'écran refresh garde le compteur
            }
        }

        function startGame() {
            currentQIndex++;
            if(currentQIndex >= questions.length) { alert("Fin de la simulation !"); return; }
            
            document.getElementById('explanation-box').style.display = 'none'; 
            currentVotes = {}; 
            saveGMState();
            
            const q = questions[currentQIndex];
            
            // LA MAGIE EST ICI : { retain: true } force le serveur MQTT à garder cette question en mémoire
            client.publish(topic, JSON.stringify({
                type: 'STATE',
                phase: 'VOTING',
                qIndex: currentQIndex, // Index envoyé au client pour éviter le double vote
                teamTurn: q.team,
                question: { text: q.text },
                options: q.options
            }), { retain: true });
            
            log(`[Q${currentQIndex+1}] Lancée. En attente...`);
            updateScreenCounts();
        }

        function closeVotes() {
            const q = questions[currentQIndex];
            let totalVoted = Object.keys(currentVotes).length;
            let correctCount = 0;
            
            Object.values(currentVotes).forEach(v => { if (v === q.correct) correctCount++; });
            let isSuccess = (correctCount >= totalVoted / 2) && totalVoted > 0;

            client.publish(topic, JSON.stringify({
                type: 'STATE',
                phase: 'RESULT',
                qIndex: currentQIndex,
                teamTurn: q.team,
                correctIndex: q.correct,
                isSuccess: isSuccess,
                correctCount: correctCount,
                totalVoted: totalVoted
            }), { retain: true }); // Retain
            
            log(`Votes terminés. ${correctCount}/${totalVoted} OK.`);
            
            document.getElementById('explanation-text').innerText = q.exp;
            document.getElementById('explanation-box').style.display = 'block';
        }

        function triggerAnimation() {
            const q = questions[currentQIndex];
            client.publish(topic, JSON.stringify({
                type: 'STATE',
                phase: 'ANIMATION',
                qIndex: currentQIndex,
                animType: q.animType
            }), { retain: true }); // Retain
            log(`Animation déclenchée.`);
        }

        function resetAll() {
            if(confirm("Êtes-vous sûr de vouloir réinitialiser toute la partie (compteurs, votes, etc) ?")) {
                localStorage.clear(); // Efface la mémoire de ton tel
                // Envoie un ordre secret au client pour vider aussi leur historique de vote
                client.publish(topic, JSON.stringify({ type: 'STATE', phase: 'RESET' }), { retain: true });
                location.reload(); // Recharge la page
            }
        }

        function log(text) {
            const logs = document.getElementById('logs');
            logs.innerHTML += `> ${text}<br>`;
            logs.scrollTop = logs.scrollHeight;
        }
    </script>
</body>
</html>
