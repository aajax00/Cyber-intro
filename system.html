<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Master Control</title>
    <script src="https://unpkg.com/mqtt/dist/mqtt.min.js"></script>
    <style>
        body { font-family: Arial, sans-serif; background: #e2e8f0; padding: 10px; margin: 0; }
        .dashboard { background: white; padding: 15px; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); width: 100%; box-sizing: border-box; }
        h1 { color: #0f172a; margin-top: 0; font-size: 22px; text-align: center;}
        h3 { color: #334155; font-size: 18px; margin: 10px 0;}
        button { border: none; padding: 20px 10px; margin: 10px 0; cursor: pointer; border-radius: 8px; font-weight: bold; width: 100%; font-size:18px; color: white;}
        .btn-blue { background: #3b82f6; } .btn-blue:active { background: #2563eb; }
        .btn-red { background: #ef4444; } .btn-red:active { background: #dc2626; }
        .btn-green { background: #10b981; } .btn-green:active { background: #059669; }
        .btn-dark { background: #334155; font-size: 14px; padding: 15px;} .btn-dark:active { background: #1e293b; }
        .btn-gold { background: #eab308; color:#0f172a;}
        .stats { display: flex; justify-content: space-around; background: #f8fafc; padding: 10px; border-radius: 5px; margin-bottom: 15px; font-size: 18px; font-weight: bold; border: 1px solid #cbd5e1;}
        .logs { height: 100px; overflow-y: scroll; background: #1e293b; color: #4ade80; padding: 10px; font-family: monospace; font-size: 12px; margin-top: 20px; border-radius: 5px;}
        #explanation-box { background: #fffbeb; border-left: 5px solid #f59e0b; padding: 15px; margin-top: 15px; display: none; font-size: 16px; color: #92400e; line-height: 1.4;}
        #explanation-title { font-weight: bold; margin-bottom: 5px; text-transform: uppercase;}
    </style>
</head>
<body>

    <div class="dashboard">
        <h1>Terminal Formateur</h1>
        
        <div class="stats">
            <div style="color: #ef4444;">🔴 Joueurs: <span id="count-red">0</span> | Pts: <span id="score-red">0</span></div>
            <div style="color: #3b82f6;">🔵 Joueurs: <span id="count-blue">0</span> | Pts: <span id="score-blue">0</span></div>
        </div>

        <h3 id="current-q-info">Chargement de la session...</h3>
        
        <button class="btn-blue" onclick="startGame()">▶️ 1. Envoyer la Question</button>
        <button class="btn-red" onclick="closeVotes()">🛑 2. Résultat (Fin votes)</button>
        <button class="btn-green" onclick="triggerAnimation()">💥 3. Lancer l'Animation</button>
        
        <div id="explanation-box">
            <div id="explanation-title">Explication (À lire à voix haute) :</div>
            <div id="explanation-text"></div>
        </div>

        <div class="logs" id="logs"></div>

        <button class="btn-gold" onclick="endGame()">🏆 Terminer la partie (Scoreboard)</button>
        <button class="btn-dark" onclick="resetAll()">🔄 Réinitialiser toute la partie</button>
    </div>

    <script>
        const client = mqtt.connect('wss://broker.emqx.io:8084/mqtt', { clean: false, clientId: 'admin_' + Math.random().toString(16).substr(2, 8) });
        const topic = "campus-cyber-kahoot-kydryl-2026-v2";
        
        const questions = [
            { team: 'red', text: "Vous touver l'IP de Safetech: 185.22.44.1, Que faites-vous en premier ?", options: ["Attaque DDoS", "Scan Nmap (ports ouverts)", "Envoie d'un malware par la poste", "Attaquer le pare-feu"], correct: 1, animType: 'nmap', exp: "Le scan Nmap envoie des paquets TCP/UDP spécifiques vers les ports de la cible. En analysant les réponses (ex: SYN/ACK), on identifie précisément les services ouverts (comme le port 80 pour le web ou 22 pour SSH) sans alerter massivement la cible (si fait discrètement)." },
            { team: 'blue', text: "Alerte ! Le pare-feu détecte un scan massif de ports.", options: ["Éteindre les serveurs", "Bloquer automatiquement l'IP", "Ignorer", "Lancer un scan retour"], correct: 1, animType: 'soc-block', exp: "Face à un scan bruyant, les IPS (Intrusion Prevention Systems) ou des outils comme Fail2Ban analysent les logs du pare-feu. S'ils détectent un seuil de connexions anormal sur divers ports, ils créent dynamiquement une règle 'DROP' dans Iptables bloquant l'IP source." },
            { team: 'red', text: "Le port Web (80) est ouvert. Comment trouver les pages cachées ?", options: ["Bruteforce", "Outil Gobuster (énumération)", "Phishing", "Abandonner"], correct: 1, animType: 'gobuster', exp: "Gobuster automatise la recherche de répertoires en utilisant un dictionnaire (wordlist). Il envoie des requêtes HTTP GET très rapides vers /admin, /test, /backup. S'il reçoit un code HTTP 200 ou 301, le dossier existe !" },
            { team: 'blue', text: "Le serveur génère des centaines d'erreurs 404 par minute !", options: ["Bloquer avec Fail2Ban", "Mettre un antivirus", "C'est normal", "Changer le site"], correct: 0, animType: 'soc-404', exp: "L'énumération par dictionnaire génère inévitablement des codes HTTP 404 (Not Found) pour chaque mot qui n'existe pas. Surveiller les pics de requêtes 404 dans les logs Nginx/Apache est la méthode standard pour détecter un attaquant qui utilise Gobuster ou DirBuster." },
            { team: 'red', text: "Page de connexion (/admin) trouvée. Comment y entrer ?", options: ["Injection SQL (SQLi)", "Ransomware", "Appeler l'entreprise", "Scanner le port 22"], correct: 0, animType: 'sqli', exp: "L'injection SQL exploite un champ de saisie non sécurisé. En tapant `admin' OR 1=1 --`, l'attaquant modifie la requête dans le backend. La base de données lit 'Si l'utilisateur est admin, OU si 1 est égal à 1 (ce qui est toujours vrai)'. Le mot de passe est ignoré, l'accès est accordé." },
            { team: 'blue', text: "Une tentative d'Injection SQL est détectée dans les logs.", options: ["Supprimer la BDD", "Changer le Wi-Fi", "Déployer un WAF", "Rien faire"], correct: 2, animType: 'soc-sqli', exp: "Un WAF (Web Application Firewall, comme ModSecurity) se place devant le serveur Web. Il inspecte le contenu (Payload) de chaque requête HTTP POST/GET. S'il détecte des patterns SQL typiques (comme les guillemets ou les commandes UNION SELECT), il bloque la requête avant qu'elle n'atteigne le backend PHP/Node." },
            { team: 'red', text: "Connecté, mais droits limités. Que chercher pour devenir Root ?", options: ["Téléphone du PDG", "Éteindre le site", "Fichiers de config (mots de passe)", "Modifier le logo"], correct: 2, animType: 'reverse-shell', exp: "Une fois un premier accès obtenu via l'application web (souvent l'utilisateur 'www-data' sur Linux), l'objectif est l'Élévation de Privilèges (PrivEsc). Les attaquants fouillent le système de fichiers pour trouver des identifiants hardcodés dans des fichiers mal protégés (ex: config.php) ou cherchent des binaires SUID mal configurés." },
            { team: 'blue', text: "Un compte basique tente d'accéder à des dossiers sensibles.", options: ["Renvoyer l'employé", "Restreindre les droits (Moindre Privilège)", "Attendre", "Formater"], correct: 1, animType: 'soc-priv', exp: "Le Principe du Moindre Privilège (PoLP) garantit qu'un utilisateur ou un processus ne possède que les droits stricts nécessaires à sa fonction. Si le serveur web est compromis, mais que ses permissions Linux interdisent la lecture du fichier '/etc/shadow', l'attaquant est bloqué. C'est du cloisonnement." },
            { team: 'red', text: "Serveur interne atteint ! Comment voler les plans discrètement ?", options: ["Par Gmail", "Imprimer au bureau", "Clé USB virtuelle", "Exfiltration via DNS"], correct: 3, animType: 'exfil', exp: "L'exfiltration classique (via FTP ou HTTP) est souvent détectée par les pare-feux sortants. Le protocole DNS (port 53) est en revanche rarement bloqué car vital. L'attaquant découpe le fichier volé, l'encode en Base64, et l'envoie via de fausses requêtes DNS vers un nom de domaine qu'il contrôle." },
            { team: 'blue', text: "Fuite de données (DNS) en cours. Ultime recours !", options: ["Payer", "Couper connexions et isoler", "Supprimer les données", "Fermer les yeux"], correct: 1, animType: 'soc-incident', exp: "Une fois la compromission avérée (Detection & Analysis), le framework NIST de Réponse à Incident exige la phase de 'Containment' (Confinement). Isoler la machine du réseau (désactiver la carte réseau ou via l'EDR) coupe le flux de l'attaquant et fige le système pour l'investigation (Forensics)." },
            { team: 'both', text: "BONUS (Toutes équipes) : Ce mail est-il du Phishing ?", options: ["Oui, Phishing", "Non", "Spam", "Newsletter"], correct: 0, animType: 'phishing', exp: "Il s'agit d'une attaque de Typosquattage. L'attaquant enregistre un nom de domaine visuellement très proche de l'original (ex: safeRNech au lieu de safeMech). L'œil humain lisant globalement les mots, il tombe facilement dans le piège. Toujours vérifier l'URL de l'expéditeur caractère par caractère." }
        ];

        // --- GESTION ÉTAT ---
        let currentQIndex = parseInt(localStorage.getItem('gm_qIndex'));
        if (isNaN(currentQIndex)) currentQIndex = -1;
        let currentVotes = JSON.parse(localStorage.getItem('gm_votes')) || {};
        
        let teamScores = JSON.parse(localStorage.getItem('gm_scores')) || { red: 0, blue: 0 };
        
        let players = { red: new Set(), blue: new Set() };
        let savedPlayers = JSON.parse(localStorage.getItem('gm_players'));
        if(savedPlayers) { players.red = new Set(savedPlayers.red); players.blue = new Set(savedPlayers.blue); }

        function saveGMState() {
            localStorage.setItem('gm_qIndex', currentQIndex);
            localStorage.setItem('gm_votes', JSON.stringify(currentVotes));
            localStorage.setItem('gm_scores', JSON.stringify(teamScores));
            localStorage.setItem('gm_players', JSON.stringify({ red: Array.from(players.red), blue: Array.from(players.blue) }));
            updateUI();
        }

        function updateUI() {
            document.getElementById('count-red').innerText = players.red.size;
            document.getElementById('count-blue').innerText = players.blue.size;
            document.getElementById('score-red').innerText = teamScores.red;
            document.getElementById('score-blue').innerText = teamScores.blue;
            if(currentQIndex >= 0 && currentQIndex < questions.length) {
                let t = questions[currentQIndex].team === 'both' ? "BONUS" : questions[currentQIndex].team.toUpperCase();
                document.getElementById('current-q-info').innerText = `Tour ${currentQIndex + 1}/11 : ${t} TEAM`;
            } else {
                document.getElementById('current-q-info').innerText = "Prêt à démarrer l'atelier...";
            }
        }
        updateUI();

        // --- MQTT ---
        client.subscribe(topic);
        client.on('message', (t, msg) => {
            const data = JSON.parse(msg.toString());
            if (data.type === 'JOIN') { players[data.team].add(data.id); saveGMState(); updateScreenCounts(); }
            if (data.type === 'VOTE') { currentVotes[data.id] = data.choice; saveGMState(); updateScreenCounts(); }
        });

        function updateScreenCounts() {
            if (currentQIndex >= 0 && currentQIndex < questions.length) {
                const team = questions[currentQIndex].team;
                const total = team === 'both' ? (players['red'].size + players['blue'].size) : players[team].size;
                client.publish(topic, JSON.stringify({ type: 'VOTER_UPDATE', votes: Object.keys(currentVotes).length, totalTeam: total }), { retain: true });
            }
        }

        function startGame() {
            currentQIndex++;
            if(currentQIndex >= questions.length) { alert("Toutes les questions sont passées ! Affichez le scoreboard."); return; }
            
            document.getElementById('explanation-box').style.display = 'none'; 
            currentVotes = {}; 
            saveGMState();
            const q = questions[currentQIndex];
            
            client.publish(topic, JSON.stringify({
                type: 'STATE', phase: 'VOTING', qIndex: currentQIndex, teamTurn: q.team, question: { text: q.text }, options: q.options
            }), { retain: true });
            
            log(`[Q${currentQIndex+1}] Lancée. En attente...`); updateScreenCounts();
        }

        function closeVotes() {
            const q = questions[currentQIndex];
            let totalVoted = Object.keys(currentVotes).length;
            let correctCount = 0;
            
            Object.values(currentVotes).forEach(v => { if (v === q.correct) correctCount++; });
            let isSuccess = (correctCount >= totalVoted / 2) && totalVoted > 0;

            // Ajout des points uniquement si la décision est validée majoritairement ET si ce n'est pas la question bonus (ou alors on donne le point à celui qui a eu le plus de bonnes reponses dans la question bonus, mais restons simple)
            if(isSuccess && q.team !== 'both') {
                teamScores[q.team]++;
                saveGMState();
            }

            client.publish(topic, JSON.stringify({
                type: 'STATE', phase: 'RESULT', qIndex: currentQIndex, teamTurn: q.team, correctIndex: q.correct, isSuccess: isSuccess, correctCount: correctCount, totalVoted: totalVoted
            }), { retain: true });
            
            log(`Votes terminés. ${correctCount}/${totalVoted} OK.`);
            document.getElementById('explanation-text').innerText = q.exp;
            document.getElementById('explanation-box').style.display = 'block';
        }

        function triggerAnimation() {
            client.publish(topic, JSON.stringify({ type: 'STATE', phase: 'ANIMATION', qIndex: currentQIndex, animType: questions[currentQIndex].animType }), { retain: true });
            log(`Animation déclenchée.`);
        }

        function endGame() {
            client.publish(topic, JSON.stringify({ type: 'STATE', phase: 'END_GAME', scores: teamScores }), { retain: true });
            log(`Affichage de l'écran de fin.`);
        }

        function resetAll() {
            if(confirm("Êtes-vous sûr de vouloir tout réinitialiser (Scores, Joueurs, Avancement) ?")) {
                localStorage.clear();
                
                // 1. On écrase la mémoire du serveur avec un état "en attente" inoffensif (retain: true)
                client.publish(topic, JSON.stringify({ type: 'STATE', phase: 'IDLE' }), { retain: true });
                
                // 2. On dit aux pages actuelles de se rafraîchir UNE FOIS (retain: false !)
                client.publish(topic, JSON.stringify({ type: 'STATE', phase: 'RESET' }), { retain: false });
                
                // On attend une demi-seconde pour que les messages partent bien, puis on rafraîchit le GM
                setTimeout(() => {
                    location.reload();
                }, 500);
            }
        }

        function log(text) {
            const logs = document.getElementById('logs');
            logs.innerHTML += `> ${text}<br>`;
            logs.scrollTop = logs.scrollHeight;
        }
    </script>
</body>
</html>
