<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cyber Terminal</title>
    <script src="https://unpkg.com/mqtt/dist/mqtt.min.js"></script>
    <style>
        body { background-color: #020617; color: white; font-family: sans-serif; text-align: center; padding: 20px; margin:0; }
        .btn { width: 100%; padding: 20px; margin: 10px 0; font-size: 18px; border-radius: 10px; border: none; font-weight: bold; cursor: pointer; }
        .red-team { background-color: #ef4444; color: white; }
        .blue-team { background-color: #3b82f6; color: white; }
        .btn-option { background-color: #1e293b; color: #22d3ee; border: 2px solid #334155; }
        .btn-option.selected { background-color: #22d3ee; color: #020617; }
        .btn-validate { background-color: #10b981; color: white; margin-top: 20px; border: 2px solid #059669; }
        .hidden { display: none; }
        .status { color: #4ade80; margin-bottom: 20px; font-weight: bold; }
        #waiting-msg { color: #94a3b8; font-style: italic; margin-top: 50px; font-size: 18px; line-height: 1.5; }
    </style>
</head>
<body>

    <div id="status" class="status">Connexion au réseau...</div>

    <div id="lobby">
        <h2>Choisissez votre division :</h2>
        <button class="btn red-team" onclick="joinTeam('red')">☠️ RED TEAM (Attaque)</button>
        <button class="btn blue-team" onclick="joinTeam('blue')">🛡️ BLUE TEAM (Défense)</button>
    </div>

    <div id="game" class="hidden">
        <h2 id="team-display"></h2>
        <div id="waiting-msg">En attente des ordres du commandant...</div>
        
        <div id="voting-area" class="hidden">
            <h3 style="color:#f8fafc" id="action-title">Sélectionnez une action :</h3>
            <button class="btn btn-option" onclick="selectOption(0)" id="opt0"></button>
            <button class="btn btn-option" onclick="selectOption(1)" id="opt1"></button>
            <button class="btn btn-option" onclick="selectOption(2)" id="opt2"></button>
            <button class="btn btn-option" onclick="selectOption(3)" id="opt3"></button>
            
            <button class="btn btn-validate hidden" id="btn-validate" onclick="submitVote()">✅ Valider ma réponse</button>
        </div>
    </div>

    <script>
        const client = mqtt.connect('wss://broker.emqx.io:8084/mqtt');
        const topic = "campus-cyber-kahoot-kydryl-2026";
        
        let myTeam = localStorage.getItem('cyberTeam') || "";
        let clientId = localStorage.getItem('cyberClientId') || ("user_" + Math.random().toString(36).substring(7));
        localStorage.setItem('cyberClientId', clientId);
        let selectedChoice = -1;
        let currentQIndex = -1; // Pour mémoriser la question en cours

        client.on('connect', () => {
            document.getElementById('status').innerText = "🟢 Connecté";
            if(myTeam !== "") {
                document.getElementById('lobby').classList.add('hidden');
                document.getElementById('game').classList.remove('hidden');
                document.getElementById('team-display').innerHTML = myTeam === 'red' ? "<span style='color:#ef4444'>Division RED TEAM</span>" : "<span style='color:#3b82f6'>Division BLUE TEAM</span>";
                client.publish(topic, JSON.stringify({ type: 'JOIN', team: myTeam, id: clientId }));
            }
        });

        function joinTeam(team) {
            myTeam = team;
            localStorage.setItem('cyberTeam', team);
            document.getElementById('lobby').classList.add('hidden');
            document.getElementById('game').classList.remove('hidden');
            document.getElementById('team-display').innerHTML = team === 'red' ? "<span style='color:#ef4444'>Division RED TEAM</span>" : "<span style='color:#3b82f6'>Division BLUE TEAM</span>";
            client.publish(topic, JSON.stringify({ type: 'JOIN', team: team, id: clientId }));
        }

        client.on('message', (t, msg) => {
            const data = JSON.parse(msg.toString());
            
            if(data.type === 'STATE') {
                currentQIndex = data.qIndex; // Sauvegarde l'index de la question envoyée par le GM
                
                if(data.phase === 'VOTING') {
                    // Vérifie si le joueur a déjà voté pour cette question après un refresh
                    let lastVotedQIndex = localStorage.getItem('lastVotedQIndex');

                    if (lastVotedQIndex == currentQIndex) {
                        // Il a déjà voté, on affiche le message d'attente
                        document.getElementById('voting-area').classList.add('hidden');
                        document.getElementById('waiting-msg').classList.remove('hidden');
                        document.getElementById('waiting-msg').innerHTML = "✅ <strong>Action déjà validée !</strong><br><br>Regardez l'écran principal.";
                    } 
                    // Si c'est à son équipe de jouer (et qu'il n'a pas voté)
                    else if(data.teamTurn === myTeam || data.teamTurn === 'both') {
                        document.getElementById('waiting-msg').classList.add('hidden');
                        document.getElementById('voting-area').classList.remove('hidden');
                        document.getElementById('btn-validate').classList.add('hidden');
                        selectedChoice = -1;
                        
                        document.getElementById('action-title').innerText = data.teamTurn === 'both' ? "🚨 QUESTION BONUS (Toutes équipes) 🚨" : "Sélectionnez une action :";

                        for(let i=0; i<4; i++) {
                            const btn = document.getElementById('opt' + i);
                            btn.innerText = data.options[i];
                            btn.classList.remove('selected');
                        }
                    } else {
                        // Ce n'est pas son tour
                        document.getElementById('voting-area').classList.add('hidden');
                        document.getElementById('waiting-msg').classList.remove('hidden');
                        document.getElementById('waiting-msg').innerText = "L'autre équipe joue. Observez l'écran principal !";
                    }
                } 
                else if (data.phase === 'RESULT' || data.phase === 'ANIMATION') {
                    // Cache les boutons de vote si on est à l'étape des résultats/animations
                    document.getElementById('voting-area').classList.add('hidden');
                    document.getElementById('waiting-msg').classList.remove('hidden');
                    document.getElementById('waiting-msg').innerHTML = "Observez l'écran principal !";
                }
            }
        });

        function selectOption(choiceId) {
            selectedChoice = choiceId;
            for(let i=0; i<4; i++) document.getElementById('opt'+i).classList.remove('selected');
            document.getElementById('opt'+choiceId).classList.add('selected');
            document.getElementById('btn-validate').classList.remove('hidden');
        }

        function submitVote() {
            if(selectedChoice !== -1) {
                // Sauvegarde qu'il a voté pour CETTE question pour résister au rafraîchissement
                localStorage.setItem('lastVotedQIndex', currentQIndex);

                client.publish(topic, JSON.stringify({ type: 'VOTE', team: myTeam, id: clientId, choice: selectedChoice }));
                document.getElementById('voting-area').classList.add('hidden');
                document.getElementById('waiting-msg').classList.remove('hidden');
                document.getElementById('waiting-msg').innerHTML = "✅ <strong>Action envoyée !</strong><br><br>Regardez l'écran principal en attendant les autres joueurs.";
            }
        }
    </script>
</body>
</html>
